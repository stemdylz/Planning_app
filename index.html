<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reno HQ</title>
<style>
body{font-family:sans-serif;background:#f7f5f0;color:#2b2722;padding:20px;}
h1{color:#b5650a;}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:12px;}
.btn{background:#b5650a;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-right:8px;}
#status{background:#2b2722;color:#50c870;padding:10px;border-radius:6px;font-family:monospace;font-size:12px;margin-bottom:16px;min-height:60px;}
</style>
</head>
<body>
<h1>RENO HQ</h1>
<div id="status">Starting...</div>
<div id="content"></div>

<script>
function log(msg){
  var el=document.getElementById('status');
  el.textContent+=msg+'\n';
}

var GS_URL='https://script.google.com/macros/s/AKfycbxPO07cDI-KrPkp_DMPuLpJX8utG29C9AynfvkZ8DOGajSY3f9x6f62Gq2nsM27lRK8vg/exec';

var PROJECTS=[
  {id:'s1',name:'Section 1 - Entertainment Area',color:'#c43d32'},
  {id:'s2',name:'Section 2 - Kitchen',color:'#f0a830'},
  {id:'s3',name:'Section 3 - Entrance Hallway',color:'#2868b0'},
  {id:'s4',name:'Section 4 - Workshop',color:'#7a3fd1'},
  {id:'s5',name:'Section 5 - Lounge',color:'#168f7a'},
  {id:'s6',name:'Section 6 - Guest Bedroom 1',color:'#228a52'},
  {id:'s7',name:'Section 7 - Guest Bedroom 2',color:'#228a52'},
  {id:'s8',name:'Section 8 - Main Bedroom',color:'#228a52'},
  {id:'s9',name:'Section 9 - Front Porch',color:'#b5650a'},
  {id:'s10',name:'Section 10 - Side A',color:'#c2531f'},
  {id:'s11',name:'Section 11 - Front of House',color:'#c2531f'},
  {id:'s12',name:'Section 12 - Side B',color:'#c2531f'},
  {id:'s13',name:'Section 13 - Driveway',color:'#6e655a'},
  {id:'s14',name:'Section 14 - Courtyard',color:'#6e655a'}
];

log('Script started');
log('Projects: '+PROJECTS.length);

function render(){
  log('Rendering...');
  var content=document.getElementById('content');
  content.innerHTML='';
  PROJECTS.forEach(function(p){
    var card=document.createElement('div');
    card.className='card';
    card.style.borderLeft='4px solid '+p.color;
    var title=document.createElement('strong');
    title.textContent=p.name;
    card.appendChild(title);
    content.appendChild(card);
  });
  log('Done - '+PROJECTS.length+' sections rendered');
}

render();

// Test Sheets connection
log('Testing Sheets connection...');
fetch(GS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'ping'}),headers:{'Content-Type':'application/json'}})
  .then(function(){ log('Sheets: connected'); })
  .catch(function(e){ log('Sheets error: '+e.message); });
</script>
</body>
</html>
